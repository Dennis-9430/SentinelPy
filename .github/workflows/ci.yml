name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  POSTGRES_DB: sentinelpy_test
  POSTGRES_USER: sentinel
  POSTGRES_PASSWORD: sentinel_test

jobs:
  backend:
    name: Backend (tests + lint)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sentinelpy_test
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel_test
        options: >-
          --health-cmd "pg_isready -U sentinel -d sentinelpy_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff pytest-cov mypy bandit

      - name: Ruff lint
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

      - name: Mypy type check
        run: mypy backend/app --config-file backend/pyproject.toml

      - name: Bandit security scan
        run: bandit -c backend/pyproject.toml -r backend/app

      - name: Run tests with coverage
        run: pytest backend/tests/ -v --tb=short --cov=backend/app --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://sentinel:sentinel_test@localhost:5432/sentinelpy_test
          SECRET_KEY: ci-test-key-not-for-production
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin123

  frontend:
    name: Frontend (typecheck + test + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: TypeScript check
        run: pnpm tsc -b
        working-directory: frontend

      - name: Run tests
        run: pnpm vitest run
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend

  agent:
    name: Agent client (tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run agent tests
        run: pytest agent/tests/ -v --tb=short --cov=agent --cov-report=term-missing
