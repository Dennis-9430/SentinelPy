<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} — {% block title %}Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3">
        <div class="flex items-center justify-between">
            <h1 class="text-xl font-bold text-cyan-400">{{ app_name }}</h1>
            <div class="space-x-4 text-sm">
                <a href="/" class="hover:text-cyan-400">Dashboard</a>
                <a href="/events" class="hover:text-cyan-400">Eventos</a>
                <a href="/alerts" class="hover:text-cyan-400">Alertas</a>
                <a href="/rules" class="hover:text-cyan-400">Reglas</a>
            </div>
        </div>
    </nav>
    <main class="p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
