<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} — Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        {# Logo #}
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-cyan-400">{{ app_name }}</h1>
            <p class="text-gray-400 mt-2 text-sm">Plataforma de monitoreo y detección de incidentes</p>
        </div>

        {# Formulario de login #}
        <div class="bg-gray-800 rounded-lg p-8 border border-gray-700">
            <h2 class="text-xl font-semibold mb-6">Iniciar Sesión</h2>

            {% if error %}
            <div class="bg-red-900/50 border border-red-700 text-red-300 px-4 py-3 rounded-lg mb-4 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-1">Usuario</label>
                    <input type="text" id="username" name="username" required
                           class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent text-gray-100 placeholder-gray-400"
                           placeholder="tu usuario">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Contraseña</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent text-gray-100 placeholder-gray-400"
                           placeholder="••••••••">
                </div>
                <button type="submit"
                        class="w-full py-2 px-4 bg-cyan-600 hover:bg-cyan-500 text-white font-medium rounded-lg transition-colors">
                    Ingresar
                </button>
            </form>
        </div>

        <p class="text-center text-gray-500 text-xs mt-6">
            {{ app_name }} v{{ app_version }}
        </p>
    </div>
</body>
</html>
